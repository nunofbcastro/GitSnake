<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2329"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  
  <!-- Snake Body -->
  <rect x="25" y="25" width="15" height="15" rx="7.5" fill="#ff7f50"/>
  <rect x="45" y="25" width="15" height="15" rx="7.5" fill="#ff7f50"/>
  <rect x="65" y="25" width="15" height="15" rx="7.5" fill="#ff7f50"/>
  <rect x="65" y="45" width="15" height="15" rx="7.5" fill="#ff7f50"/>
  
  <!-- Snake Head -->
  <rect x="63" y="63" width="19" height="19" rx="9.5" fill="#ff4757" filter="url(#glow)"/>
  
  <!-- Contribution Squares -->
  <rect x="25" y="65" width="15" height="15" rx="3" fill="#39d353" opacity="0.8"/>
  <rect x="45" y="45" width="15" height="15" rx="3" fill="#26a641" opacity="0.6"/>
  <rect x="25" y="45" width="15" height="15" rx="3" fill="#006d32" opacity="0.4"/>
</svg>